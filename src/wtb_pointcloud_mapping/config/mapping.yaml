input:
  # Only point-cloud subscription used by wtb_mapping_node.
  # This topic is published by livox_to_pointcloud2 after FOV/range cropping.
  cloud_topic: "/livox/lidar"
  odom_topic: &local_odom "/wtb/odom"
  cloud_type: "livox_custom"
  use_tf: false
  world_frame: "map"
  body_frame: "iris_0/base_link"
  lidar_frame: "livox_link"

initial_pose_frame:
  input_odom_topic: "/iris_0/mavros/vision_odom/odom"
  output_odom_topic: *local_odom
  source_frame: "world"
  local_frame: "map"
  body_frame: "iris_0/base_link"

sync:
  max_time_diff: 0.05
  strict_time_sync: false

extrinsic:
  # T_body_lidar: transform point from lidar frame to body frame
  # Points are transformed from lidar coordinates into body coordinates.
  # Matches livox_laser_simulation/models/iris_mid360/iris_mid360.sdf:
  # <pose>0.07 0 0.072 0 0.3925 0</pose>
  lidar_to_body_xyz: [0.07, 0.0, 0.072]
  lidar_to_body_rpy: [0.0, 0.3925, 0.0]

global_cloud:
  enable: true
  voxel_leaf_size: 0.10
  publish_rate: 2.0
  max_points: 3000000

occupancy_grid:
  enable: true
  resolution: 0.20
  log_odds_hit: 0.85
  log_odds_miss: -0.40
  log_odds_min: -2.0
  log_odds_max: 3.5
  occupied_threshold: 1.0
  free_threshold: -1.0
  max_ray_length: 80.0
  publish_rate: 2.0

path:
  enable: true
  topic: "/wtb/uav_path"
  min_distance: 0.05
  max_points: 10000

debug:
  print_timing: true
  publish_free_cloud: false

tower_detector:
  cloud_topic: "/wtb/current_cloud_world"
  odom_topic: "/wtb/odom"
  world_frame: "map"
  status_topic: "/wtb/tower_detector/status"
  control_point_topic: "/wtb/tower_detector/control_point"
  control_pose_topic: "/wtb/tower_detector/control_pose"
  axis_direction_topic: "/wtb/tower_detector/axis_direction"
  markers_topic: "/wtb/tower_detector/markers"
  inlier_cloud_topic: "/wtb/tower_detector/inlier_cloud"
  path_topic: "/wtb/tower_detector/path"
  diameter_topic: "/wtb/tower_detector/diameter"
  radius_topic: "/wtb/tower_detector/radius"
  param_namespace: "/wtb/tower_detector"
  legacy_param_namespace: "/tower"
  update_rate: 2.0
  distance_threshold: 0.8
  num_iterations: 80
  vertical_angle_max_deg: 15.0
  min_inlier_ratio: 0.05
  min_line_inliers: 30
  min_points: 30
  max_sample_points: 3000
  xy_tolerance: 1.5
  radius_min: 0.1
  radius_max: 10.0
  marker_cylinder_diameter: 0.6
  control_point_min_spacing: 1.5
  max_path_points: 5000
  estimate_diameter_once: true
  publish_markers: true
  publish_inlier_cloud: true
  print_status: true
